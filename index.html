
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Chat App - 12h Expiry</title>
                <style>
                        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
                                header { background-color: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
                                        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
                                                .message { max-width: 70%; padding: 8px 12px; border-radius: 8px; font-size: 15px; position: relative; }
                                                        .my-message { align-self: flex-end; background-color: #dcf8c6; }
                                                                .other-message { align-self: flex-start; background-color: #ffffff; }
                                                                        .time { font-size: 10px; color: #999; display: block; margin-top: 4px; text-align: left; }
                                                                                .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
                                                                                        input { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
                                                                                                button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
                                                                                                    </style>
                                                                                                    </head>
                                                                                                    <body>
                                                                                                        <header>دردشة خاصة (حذف تلقائي 12 ساعة)</header>
                                                                                                            <div id="chat-box"></div>
                                                                                                                <div class="input-area">
                                                                                                                        <input type="text" id="msg-input" placeholder="اكتب رسالتك هنا...">
                                                                                                                                <button onclick="sendMessage()">إرسال</button>
                                                                                                                                    </div>

                                                                                                                                        <script>
                                                                                                                                                const chatBox = document.getElementById('chat-box');
                                                                                                                                                        const msgInput = document.getElementById('msg-input');
                                                                                                                                                                let messages = JSON.parse(localStorage.getItem('messages') || '[]');

                                                                                                                                                                        function renderMessages() {
                                                                                                                                                                                    const now = Date.now();
                                                                                                                                                                                                const twelveHours = 12 * 60 * 60 * 1000;
                                                                                                                                                                                                            
                                                                                                                                                                                                                        // Filter messages older than 12 hours
                                                                                                                                                                                                                                    messages = messages.filter(m => (now - m.timestamp) < twelveHours);
                                                                                                                                                                                                                                                localStorage.setItem('messages', JSON.stringify(messages));

                                                                                                                                                                                                                                                            chatBox.innerHTML = '';
                                                                                                                                                                                                                                                                        messages.forEach(m => {
                                                                                                                                                                                                                                                                                        const div = document.createElement('div');
                                                                                                                                                                                                                                                                                                        div.className = `message ${m.sender === 'me' ? 'my-message' : 'other-message'}`;
                                                                                                                                                                                                                                                                                                                        div.innerHTML = `${m.text} <span class="time">${new Date(m.timestamp).toLocaleTimeString()}</span>`;
                                                                                                                                                                                                                                                                                                                                        chatBox.appendChild(div);
                                                                                                                                                                                                                                                                                                                                                    });
                                                                                                                                                                                                                                                                                                                                                                chatBox.scrollTop = chatBox.scrollHeight;
                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                function sendMessage() {
                                                                                                                                                                                                                                                                                                                                                                                            if (!msgInput.value.trim()) return;
                                                                                                                                                                                                                                                                                                                                                                                                        const msg = {
                                                                                                                                                                                                                                                                                                                                                                                                                        text: msgInput.value,
                                                                                                                                                                                                                                                                                                                                                                                                                                        timestamp: Date.now(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                        sender: 'me'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                messages.push(msg);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            msgInput.value = '';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        renderMessages();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Auto clean every minute
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setInterval(renderMessages, 60000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        renderMessages();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </html>
