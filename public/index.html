<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة وائل الجماعية</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        #chat { height: 400px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { background: #dcf8c6; padding: 8px; margin: 4px 0; border-radius: 5px; align-self: flex-start; max-width: 80%; }
    </style>
</head>
<body>
    <h3>دردشة جماعية (حذف بعد 12 ساعة)</h3>
    <div id="chat"></div>
    <input type="text" id="text" placeholder="اكتب رسالتك...">
    <button onclick="send()">إرسال</button>

    <script>
        const socket = io();
        const LIMIT = 12 * 60 * 60 * 1000;

        // إرسال الرسالة للسيرفر ليراها الجميع
        function send() {
            const el = document.getElementById('text');
            if(!el.value) return;
            const data = { txt: el.value, time: Date.now() };
            socket.emit('chat message', data);
            el.value = '';
        }

        // استقبال الرسائل من السيرفر وحفظها محلياً للحذف التلقائي
        socket.on('chat message', (data) => {
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            msgs.push(data);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            show();
        });

        function show() {
            const box = document.getElementById('chat');
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            const now = Date.now();
            msgs = msgs.filter(m => (now - m.time) < LIMIT);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            box.innerHTML = msgs.map(m => `<div class="msg">${m.txt}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }
        
        show();
        setInterval(show, 60000); 
    </script>
</body>
</html>
