<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة وائل الاحترافية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        
        /* الهيدر */
        header { background: #1f1f1f; padding: 15px; text-align: center; border-bottom: 2px solid #00d2ff; }
        
        /* منطقة الرسائل */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { max-width: 80%; padding: 10px 15px; border-radius: 15px; position: relative; word-wrap: break-word; }
        .others { background: #2c2c2c; align-self: flex-start; border-bottom-left-radius: 2px; }
        .mine { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .user-name { font-size: 0.8em; color: #00d2ff; margin-bottom: 5px; display: block; }

        /* منطقة الإدخال */
        footer { background: #1f1f1f; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; background: #333; color: white; }
        button { background: #00d2ff; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* توافق الجوال */
        @media (max-width: 600px) {
            .msg-box { max-width: 90%; }
            header h2 { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <header><h2>غرفة دردشة وائل 🌐</h2></header>
    
    <div id="chat-container"></div>

    <footer>
        <input id="userName" type="text" placeholder="اسمك..." style="flex: 0.3;">
        <input id="messageInput" type="text" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('userName');
        const msgInput = document.getElementById('messageInput');

        // وظيفة إضافة الرسالة للشاشة
        function appendMessage(data, isOld = false) {
            const div = document.createElement('div');
            const currentUser = userInput.value || "مجهول";
            div.className = `msg-box ${data.user === currentUser ? 'mine' : 'others'}`;
            div.innerHTML = `<span class="user-name">${data.user}</span>${data.message}`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight; // التمرير للأسفل تلقائياً
        }

        // تحميل الرسائل القديمة (حل مشكلة undefined)
        socket.on('load messages', (messages) => {
            chatContainer.innerHTML = ''; // تنظيف الحاوية
            messages.forEach(msg => appendMessage(msg));
        });

        // استقبال رسالة جديدة
        socket.on('chat message', (data) => {
            appendMessage(data);
        });

        function sendMessage() {
            const user = userInput.value.trim();
            const message = msgInput.value.trim();
            if (user && message) {
                socket.emit('chat message', { user, message });
                msgInput.value = '';
            } else {
                alert("يرجى كتابة الاسم والرسالة!");
            }
        }

        // الإرسال عند الضغط على Enter
        msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
