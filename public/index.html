<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wael Chat - Firebase</title>
    <style>
        /* التنسيقات (CSS) */
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 70%; position: relative; word-wrap: break-word; }
        .mine { align-self: flex-end; background-color: #dcf8c6; }
        .others { align-self: flex-start; background-color: white; border: 1px solid #ddd; }
        .user-tag { font-size: 0.8em; color: #555; display: block; margin-bottom: 5px; font-weight: bold; }
        .delete-btn { cursor: pointer; color: #ff4d4d; font-size: 10px; margin-top: 5px; display: block; text-decoration: underline; }
        #input-area { padding: 15px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; background: #25d366; color: white; border: none; border-radius: 5px; cursor: pointer; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="lock-screen">
        <h2>مرحباً بك في دردشة وائل</h2>
        <input type="text" id="nameInput" placeholder="أدخل اسمك هنا..." style="flex: none; width: 250px; margin-bottom: 10px;">
        <button onclick="checkAccess()">دخول</button>
    </div>

    <header>
        دردشة: <span id="display-name">...</span>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <!-- البرمجة (JavaScript) بنظام الموديول للربط مع Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.1.0/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyDpY95ywUC5E3-Xi5TNGvlZQ1XvP_35zlo",
          authDomain: "wael-chat-da664.firebaseapp.com",
          databaseURL: "https://wael-chat-da664-default-rtdb.firebaseio.com",
          projectId: "wael-chat-da664",
          storageBucket: "wael-chat-da664.firebasestorage.app",
          messagingSenderId: "676333359273",
          appId: "1:676333359273:web:e195ac98a1725e4a3359b8",
          measurementId: "G-XEMQYJYFW4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        let myName = localStorage.getItem('wael-chat-name') || "";

        // التحقق من الاسم وإخفاء شاشة القفل
        window.checkAccess = () => {
            const nameInp = document.getElementById('nameInput');
            if (nameInp.value.trim() !== "") {
                myName = nameInp.value.trim();
                localStorage.setItem('wael-chat-name', myName);
                document.getElementById('display-name').innerText = myName;
                document.getElementById('lock-screen').style.display = "none";
            }
        };

        // إذا كان الاسم محفوظاً مسبقاً
        if (myName) {
            document.getElementById('display-name').innerText = myName;
            document.getElementById('lock-screen').style.display = "none";
        }

        // إرسال الرسالة
        window.sendMessage = () => {
            const input = document.getElementById('messageInput');
            if (input.value.trim() && myName) {
                push(messagesRef, {
                    user: myName,
                    message: input.value.trim(),
                    timestamp: Date.now()
                });
                input.value = "";
            }
        };

        // استقبال الرسائل الجديدة
        onChildAdded(messagesRef, (snapshot) => {
            appendMessage({ ...snapshot.val(), _id: snapshot.key });
        });

        // تحديث الواجهة عند الحذف
        onChildRemoved(messagesRef, (snapshot) => {
            const el = document.getElementById(snapshot.key);
            if (el) el.remove();
        });

        // عرض الرسالة
        function appendMessage(data) {
            const chat = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = data._id;
            div.className = `msg ${data.user === myName ? 'mine' : 'others'}`;
            div.innerHTML = `
                <span class="user-tag">${data.user}</span>
                <div>${data.message}</div>
                ${data.user === myName ? `<span class="delete-btn" onclick="deleteMsg('${data._id}')">حذف للكل</span>` : ''}
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // حذف الرسالة من قاعدة البيانات
        window.deleteMsg = (id) => {
            if(confirm("حذف الرسالة نهائياً؟")) {
                remove(ref(db, 'messages/' + id));
            }
        };

        // دعم الإرسال عبر زر Enter
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
