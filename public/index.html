<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة وائل الجماعية</title>
    <!-- هذا السطر هو المسؤول عن الربط -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; padding: 20px; display: flex; flex-direction: column; height: 90vh; }
        #chat { flex: 1; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; border-radius: 8px; }
        .msg { background: #dcf8c6; padding: 10px; margin: 5px 0; border-radius: 10px; align-self: flex-start; max-width: 80%; }
        .user-name { font-size: 0.8em; font-weight: bold; color: #075e54; margin-bottom: 2px; }
    </style>
</head>
<body>
    <h3>الدردشة الجماعية (12 ساعة)</h3>
    <div id="chat"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="text" style="flex: 1; padding: 10px;" placeholder="اكتب رسالتك...">
        <button onclick="send()" style="padding: 10px 20px;">إرسال</button>
    </div>

    <script>
        const socket = io(); // تفعيل الربط
        const LIMIT = 12 * 60 * 60 * 1000;

        let userName = localStorage.getItem('chat_user_name') || prompt("أدخل اسمك:");
        if(!userName) userName = "زائر";
        localStorage.setItem('chat_user_name', userName);

        function send() {
            const el = document.getElementById('text');
            if(!el.value) return;
            const data = { user: userName, txt: el.value, time: Date.now() };
            socket.emit('chat message', data); // إرسال للسيرفر
            el.value = '';
        }

        socket.on('chat message', (data) => {
            // استقبال من السيرفر وحفظ محلي للحذف التلقائي
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            msgs.push(data);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            show();
        });

        function show() {
            const box = document.getElementById('chat');
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            const now = Date.now();
            msgs = msgs.filter(m => (now - m.time) < LIMIT);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            box.innerHTML = msgs.map(m => `
                <div class="msg">
                    <div class="user-name">${m.user}</div>
                    <div>${m.txt}</div>
                </div>`).join('');
            box.scrollTop = box.scrollHeight;
        }
        show();
    </script>
</body>
</html>
