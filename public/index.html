<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة وائل الاحترافية</title>
    
    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- إعدادات PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0088cc">
</head>
<body>

    <!-- شاشة القفل والاسم -->
    <div id="lock-screen">
        <h2 id="lock-title">أدخل رمز الدخول</h2>
        <input type="password" id="passInput" placeholder="الرمز (1234)">
        <input type="text" id="nameInput" placeholder="اسمك المستعار" style="display: none;">
        <button onclick="checkAccess()" id="loginBtn">دخول</button>
    </div>

    <header>
        <div class="user-info">
            <span id="display-name">...</span>
            <span class="status-dot">● متصل</span>
        </div>
        <h2>دردشة وائل ⚡</h2>
    </header>

    <div id="chat-container">
        <!-- الرسائل تظهر هنا -->
    </div>

    <footer>
        <label class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
            <input type="file" id="fileInput" hidden accept="image/*,video/*">
        </label>
        <input id="messageInput" type="text" placeholder="اكتب رسالة...">
        <div id="sendBtn" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
    </footer>

    <!-- المكتبات والبرمجة -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
