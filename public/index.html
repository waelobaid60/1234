<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دردشة وائل الاحترافية</title>
    <style>
        :root { --primary: #0088cc; --bg: #0f172a; --msg-me: #0284c7; --msg-them: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        html, body { height: 100%; overflow: hidden; background: var(--bg); color: white; }
        
        /* قفل التطبيق */
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        input[type="password"], input[type="text"] { padding: 12px; border-radius: 10px; border: none; outline: none; text-align: center; }

        header { padding: 15px; background: #1e293b; border-bottom: 1px solid #334155; flex-shrink: 0; display: flex; justify-content: space-between; }
        
        #chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; position: relative; font-size: 0.9rem; }
        .mine { align-self: flex-end; background: var(--msg-me); }
        .others { align-self: flex-start; background: var(--msg-them); }
        .delete-btn { font-size: 0.7rem; color: #ff4d4d; cursor: pointer; margin-top: 5px; display: block; text-align: left; }
        
        img, video { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        footer { padding: 10px; background: #1e293b; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        #messageInput { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #334155; color: white; }
        .icon-btn { cursor: pointer; fill: white; width: 24px; height: 24px; }
    </style>
</head>
<body>

    <!-- شاشة القفل والاسم -->
    <div id="lock-screen">
        <h2 id="lock-title">أدخل رمز الدخول</h2>
        <input type="password" id="passInput" placeholder="الرمز (1234)">
        <input type="text" id="nameInput" placeholder="اسمك المستعار" style="display: none;">
        <button onclick="checkAccess()" style="padding: 10px 30px; border-radius: 20px; border: none; background: var(--primary); color: white;">دخول</button>
    </div>

    <header>
        <span id="display-name">...</span>
        <span style="color: #22c55e;">● متصل</span>
    </header>

    <div id="chat-container"></div>

    <footer>
        <!-- زر الصور/الفيديو -->
        <label class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
            <input type="file" id="fileInput" hidden accept="image/*,video/*" onchange="sendFile(this)">
        </label>
        <input id="messageInput" type="text" placeholder="اكتب رسالة...">
        <div onclick="sendMessage()" class="icon-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        function checkAccess() {
            const pass = document.getElementById('passInput');
            const nameInp = document.getElementById('nameInput');
            
            if (pass.value === "1234") {
                pass.style.display = "none";
                nameInp.style.display = "block";
                document.getElementById('lock-title').innerText = "ما هو اسمك؟";
                if (nameInp.value.trim() !== "") {
                    myName = nameInp.value.trim();
                    document.getElementById('display-name').innerText = myName;
                    document.getElementById('lock-screen').style.display = "none";
                }
            } else if (pass.style.display === "none") {
                alert("يرجى كتابة الاسم");
            } else {
                alert("الرمز خطأ!");
            }
        }

        function appendMessage(data) {
            const div = document.createElement('div');
            div.id = data._id;
            div.className = `msg ${data.user === myName ? 'mine' : 'others'}`;
            
            let content = `<strong>${data.user}</strong><br>${data.message}`;
            if (data.file) {
                if (data.fileType.includes('image')) content += `<img src="${data.file}">`;
                else content += `<video controls src="${data.file}"></video>`;
            }
            
            // إضافة زر الحذف فقط لرسائلي
            if (data.user === myName) {
                content += `<span class="delete-btn" onclick="deleteMsg('${data._id}')">حذف للكل</span>`;
            }

            div.innerHTML = content;
            document.getElementById('chat-container').appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }

        function sendMessage() {
            const msg = document.getElementById('messageInput').value;
            if (msg.trim()) {
                socket.emit('chat message', { user: myName, message: msg });
                document.getElementById('messageInput').value = "";
            }
        }

        function sendFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                socket.emit('chat message', { 
                    user: myName, 
                    message: "أرسل ملفاً", 
                    file: e.target.result, 
                    fileType: file.type 
                });
            };
            reader.readAsDataURL(file);
        }

        function deleteMsg(id) {
            if(confirm("هل تريد حذف الرسالة للجميع؟")) socket.emit('delete message', id);
        }

        socket.on('load messages', (msgs) => msgs.forEach(appendMessage));
        socket.on('chat message', appendMessage);
        socket.on('message deleted', (id) => {
            const el = document.getElementById(id);
            if(el) el.remove();
        });
    </script>
</body>
</html>
