<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة وائل - MongoDB</title>
    
    <!-- مكتبة Socket.io للاتصال الفوري -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e5ddd5; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 95vh; }
        h3 { text-align: center; color: #075e54; margin: 10px 0; font-size: 1.1em; }
        #chat { flex: 1; border: 1px solid #ccc; background: #fff; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .msg-container { margin: 8px 0; display: flex; flex-direction: column; }
        .user-name { font-size: 0.75em; color: #128c7e; margin-bottom: 3px; font-weight: bold; padding: 0 5px; }
        .msg-text { background: #fff; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 85%; border: 1px solid #eee; word-wrap: break-word; line-height: 1.4; }
        
        /* تمييز رسائلي الخاصة */
        .my-msg .msg-text { background: #dcf8c6; align-self: flex-end; border: none; }
        .my-msg .user-name { align-self: flex-end; }

        .input-area { display: flex; gap: 8px; padding: 10px 0; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h3>غرفة الدردشة المتصلة بـ MongoDB</h3>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="text" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        const socket = io();
        
        // 1. إدارة اسم المستخدم
        let userName = localStorage.getItem('chat_user_name');
        if (!userName) {
            userName = prompt("مرحباً! أدخل اسمك المستعار:");
            if (!userName || userName.trim() === "") userName = "زائر_" + Math.floor(Math.random() * 100);
            localStorage.setItem('chat_user_name', userName);
        }

        // 2. وظيفة إرسال الرسالة
        function send() {
            const el = document.getElementById('text');
            const msg = el.value.trim();
            if(!msg) return;

            // نرسل البيانات للسيرفر ليقوم بحفظها في MongoDB ونشرها
            socket.emit('chat message', {
                user: userName,
                txt: msg
            });
            el.value = '';
        }

        // 3. استقبال الرسائل السابقة عند فتح الصفحة (من MongoDB)
        socket.on('load messages', (msgs) => {
            const box = document.getElementById('chat');
            box.innerHTML = msgs.map(m => createMsgHTML(m)).join('');
            scrollToBottom();
        });

        // 4. استقبال رسالة جديدة فوراً
        socket.on('chat message', (data) => {
            const box = document.getElementById('chat');
            box.innerHTML += createMsgHTML(data);
            scrollToBottom();
        });

        // وظيفة بناء شكل الرسالة
        function createMsgHTML(data) {
            const isMe = data.user === userName;
            return `
                <div class="msg-container ${isMe ? 'my-msg' : ''}">
                    <div class="user-name">${data.user}</div>
                    <div class="msg-text">${data.txt}</div>
                </div>
            `;
        }

        function scrollToBottom() {
            const box = document.getElementById('chat');
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
