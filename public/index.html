<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة وائل الجماعية</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        #chat { height: 450px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; border-radius: 8px; }
        .msg-container { margin: 5px 0; display: flex; flex-direction: column; }
        .user-name { font-size: 0.8em; color: #555; margin-bottom: 2px; font-weight: bold; }
        .msg-text { background: #dcf8c6; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg .msg-text { background: #e3f2fd; align-self: flex-end; }
        .my-msg .user-name { align-self: flex-end; }
    </style>
</head>
<body>
    <h3>غرفة الدردشة - مرحباً <span id="display-name"></span></h3>
    <div id="chat"></div>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="text" style="flex: 1; padding: 10px;" placeholder="اكتب رسالتك هنا...">
        <button onclick="send()" style="padding: 10px 20px; cursor: pointer;">إرسال</button>
    </div>

    <script>
        const socket = io();
        const LIMIT = 12 * 60 * 60 * 1000; // 12 ساعة

        // طلب الاسم عند الدخول
        let userName = localStorage.getItem('chat_user_name');
        if (!userName) {
            userName = prompt("من فضلك أدخل اسمك المستعار:");
            if (!userName) userName = "زائر " + Math.floor(Math.random() * 1000);
            localStorage.setItem('chat_user_name', userName);
        }
        document.getElementById('display-name').innerText = userName;

        function send() {
            const el = document.getElementById('text');
            if(!el.value) return;
            
            const data = { 
                user: userName, 
                txt: el.value, 
                time: Date.now() 
            };
            
            socket.emit('chat message', data);
            el.value = '';
        }

        socket.on('chat message', (data) => {
            // حفظ الرسالة محلياً للحذف التلقائي
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            msgs.push(data);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            show();
        });

        function show() {
            const box = document.getElementById('chat');
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            const now = Date.now();
            
            // فلترة وحذف الرسائل التي مر عليها 12 ساعة
            msgs = msgs.filter(m => (now - m.time) < LIMIT);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            
            box.innerHTML = msgs.map(m => `
                <div class="msg-container ${m.user === userName ? 'my-msg' : ''}">
                    <div class="user-name">${m.user}</div>
                    <div class="msg-text">${m.txt}</div>
                </div>
            `).join('');
            
            box.scrollTop = box.scrollHeight;
        }
        
        show();
        setInterval(show, 60000); // تحديث كل دقيقة لفحص وقت الحذف
    </script>
</body>
</html>
