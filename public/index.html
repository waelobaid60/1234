<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دردشة وائل</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        #chat { height: 300px; border: 1px solid #ddd; background: #fff; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg { background: #dcf8c6; padding: 8px; margin: 4px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h3>غرفة الدردشة (حذف تلقائي 12 ساعة)</h3>
    <div id="chat"></div>
    <input type="text" id="text" placeholder="اكتب هنا...">
    <button onclick="send()">إرسال</button>

    <script>
        const LIMIT = 12 * 60 * 60 * 1000; // 12 ساعة بالملي ثانية

        function send() {
            const el = document.getElementById('text');
            if(!el.value) return;
            const m = { txt: el.value, time: Date.now() };
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            msgs.push(m);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            el.value = '';
            show();
        }

        function show() {
            const box = document.getElementById('chat');
            let msgs = JSON.parse(localStorage.getItem('msgs') || '[]');
            const now = Date.now();
            // حذف الرسائل القديمة
            msgs = msgs.filter(m => (now - m.time) < LIMIT);
            localStorage.setItem('msgs', JSON.stringify(msgs));
            box.innerHTML = msgs.map(m => `<div class="msg">${m.txt}</div>`).join('');
        }
        show();
        setInterval(show, 30000); // تحديث كل 30 ثانية
    </script>
</body>
</html>
